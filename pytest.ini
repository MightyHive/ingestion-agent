[pytest]
# src/ tiene un __init__.py vacío (legacy) que hace que pytest lo trate como
# package, lo cual rompe los imports absolutos de src/ingestion/__init__.py
# (`from ingestion.graph import ...`). Forzar src/ en pythonpath evita el
# rompimiento sin tocar el __init__ legacy.
pythonpath = src
testpaths = src/ingestion/tests
